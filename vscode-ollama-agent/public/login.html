<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in - Big Hal</title>
  <link rel="icon" href="/big_hal.png" type="image/png">
  <link rel="apple-touch-icon" href="/big_hal.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-panel" aria-label="Authentication">
      <div class="login-brand">
        <img class="login-mark" src="/big_hal.png" alt="Big Hal">
        <h1>Big Hal</h1>
        <p>Your Personal Assistant</p>
      </div>

      <div class="login-actions">
        <a class="login-primary" href="/auth/start">
          <i data-lucide="log-in"></i>
          Sign in
        </a>
        <a class="login-secondary" href="/auth/register">
          <i data-lucide="user-plus"></i>
          Create account
        </a>
      </div>
    </section>
  </main>
  <script src="/vendor/lucide/lucide.min.js"></script>
  <script>
    window.lucide?.createIcons?.({
      icons: window.lucide.icons,
      attrs: { width: 18, height: 18, 'stroke-width': 2 }
    });
  </script>
</body>
</html>
