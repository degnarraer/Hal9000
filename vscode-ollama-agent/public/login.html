<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in - Ollama Assistant</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-panel">
      <div class="login-brand">
        <span class="login-mark">HAL</span>
        <div>
          <h1>Ollama Assistant</h1>
          <p>Secure access is required.</p>
        </div>
      </div>
      <div class="login-actions">
        <a class="login-primary" href="/auth/start">Sign in</a>
        <a class="login-secondary" href="/auth/register">Create account</a>
      </div>
      <p class="login-note">Accounts are managed by Keycloak or your configured OIDC provider.</p>
    </section>
  </main>
</body>
</html>
