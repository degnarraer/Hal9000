<!doctype html>
<html>
<body>
<script>
const svg = "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"bobFaceTitle\">\n  <title id=\"bobFaceTitle\">Smiling Bob face</title>\n  <rect width=\"512\" height=\"512\" rx=\"96\" fill=\"#020712\"/>\n  <g id=\"bobHead\">\n    <path id=\"bobHeadTop\" d=\"M96 64h320l32 32H64Z\" fill=\"#10224a\" opacity=\".6\"/>\n    <path id=\"bobHeadRight\" d=\"M416 64l32 32v320l-32 32Z\" fill=\"#030b1f\" opacity=\".52\"/>\n    <path id=\"bobHeadBottom\" d=\"M64 416h384l-32 32H96Z\" fill=\"#010615\" opacity=\".48\"/>\n    <path id=\"bobHeadLeft\" d=\"M64 64L32 96v320l32 32Z\" fill=\"#0b1838\" opacity=\".22\"/>\n    <rect id=\"bobHeadFront\" x=\"64\" y=\"64\" width=\"384\" height=\"384\" rx=\"64\" fill=\"#071229\" stroke=\"#00e0ff\" stroke-width=\"10\"/>\n  </g>\n  <g id=\"bobForehead\">\n    <path id=\"bobForeheadLine1\" d=\"M168 108 Q256 100 344 108\" stroke=\"#dfe9ff\" stroke-width=\"7\" stroke-linecap=\"round\" fill=\"none\" opacity=\".1\"/>\n    <path id=\"bobForeheadLine2\" d=\"M196 128 Q256 123 316 128\" stroke=\"#dfe9ff\" stroke-width=\"5\" stroke-linecap=\"round\" fill=\"none\" opacity=\".05\"/>\n  </g>\n  <g id=\"bobBrow\">\n    <path id=\"bobLeftBrow\" d=\"M126 158 Q176 136 226 148\" stroke=\"#00e0ff\" stroke-width=\"16\" stroke-linecap=\"round\" fill=\"none\" opacity=\".72\"/>\n    <path id=\"bobRightBrow\" d=\"M286 148 Q336 136 386 158\" stroke=\"#7c5cff\" stroke-width=\"16\" stroke-linecap=\"round\" fill=\"none\" opacity=\".72\"/>\n  </g>\n  <g id=\"bobEyes\">\n    <ellipse id=\"bobLeftEye\" cx=\"186\" cy=\"236\" rx=\"34\" ry=\"19\" fill=\"#00e0ff\"/>\n    <ellipse id=\"bobRightEye\" cx=\"326\" cy=\"236\" rx=\"34\" ry=\"19\" fill=\"#7c5cff\"/>\n    <path id=\"bobLeftEyeIcon\" fill=\"#00e0ff\" opacity=\"0\"/>\n    <path id=\"bobRightEyeIcon\" fill=\"#7c5cff\" opacity=\"0\"/>\n  </g>\n  <path id=\"bobMouth\" d=\"M158 320 Q256 374 354 320\" stroke=\"#dfe9ff\" stroke-width=\"28\" stroke-linecap=\"round\" fill=\"none\"/>\n</svg>\n";
const sizes = [180,192,512];
const results = [];
function render(size) {
  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(image, 0, 0, size, size);
      resolve(canvas.toDataURL('image/png').split(',')[1]);
    };
    image.onerror = () => reject(new Error('Could not render SVG icon at ' + size));
    image.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  });
}
(async () => {
  for (const size of sizes) {
    results.push({ size, data: await render(size) });
  }
  document.body.textContent = JSON.stringify(results);
})();
</script>
</body>
</html>
