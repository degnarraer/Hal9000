<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ollama Assistant</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <main class="main">
      <div id="mainContent" class="main-content">
      <div class="chat-container">
        <div class="chat-header">
          <h1>Ollama Assistant</h1>
          <p class="subtitle">Chat with AI Models</p>
        </div>

        <div class="voice-strip" aria-label="Voice activity">
          <div class="voice-panel ai-voice">
            <div class="voice-label voice-label-row">
              <span><i data-lucide="bot"></i> AI</span>
              <div id="playbackSpeed" class="playback-speed" aria-label="Playback speed">
                <button type="button" data-speed-step="-1" aria-label="Slower" title="Slower">
                  <i data-lucide="rewind"></i>
                </button>
                <span id="playbackRateLabel">1x</span>
                <button type="button" data-speed-step="1" aria-label="Faster" title="Faster">
                  <i data-lucide="fast-forward"></i>
                </button>
              </div>
            </div>
            <canvas id="aiWaveform" width="420" height="80"></canvas>
          </div>
          <div class="voice-panel user-voice">
            <div class="voice-label voice-label-row">
              <span>You <i data-lucide="user"></i></span>
              <button id="micToggle" class="btn-mic" type="button" aria-label="Toggle microphone">
                <i data-lucide="mic"></i> Voice Input
              </button>
            </div>
            <canvas id="waveform" width="420" height="80"></canvas>
            <div id="vttOutput" class="vtt-output" aria-live="polite"></div>
          </div>
        </div>
        
        <div id="messages" class="messages" aria-live="polite"></div>

        <div class="input-section">
          <form id="composer" class="composer" action="javascript:;">
            <div class="input-wrapper">
              <input id="input" autocomplete="off" placeholder="Ask the assistant..." />
              <button id="send" class="btn-send" aria-label="Send message">
                <i data-lucide="send"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
      </div>
    </main>
  </div>

  <script src="/vendor/lucide/lucide.min.js"></script>
  <script src="/app.js"></script>
  <script src="/mic.js"></script>
  <script src="/menu.js"></script>
</body>
</html>
