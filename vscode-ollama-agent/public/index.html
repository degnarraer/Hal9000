<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020712">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Big HAL">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ollama Assistant</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/big_hal.png" type="image/png">
  <link rel="apple-touch-icon" href="/big_hal.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <main class="main">
      <div id="mainContent" class="main-content">
      <div class="chat-container">
        <div class="voice-strip" aria-label="Voice activity">
          <div class="voice-panel ai-voice">
            <div class="voice-label voice-label-row">
              <span><i data-lucide="bot"></i> AI</span>
              <div class="ai-card-controls">
                <div class="model-picker" hidden>
                  <label for="model">Model</label>
                  <select id="model" aria-label="Select chat model">
                    <option value="llama2">llama2</option>
                  </select>
                  <button id="refreshModels" class="btn-icon" type="button" aria-label="Refresh models" title="Refresh models">
                    <i data-lucide="refresh-cw"></i>
                  </button>
                </div>
                <div id="playbackSpeed" class="playback-speed" aria-label="Playback speed">
                  <button type="button" data-speed-step="-1" aria-label="Slower" title="Slower">
                    <i data-lucide="rewind"></i>
                  </button>
                  <span id="playbackRateLabel">1x</span>
                  <button type="button" data-speed-step="1" aria-label="Faster" title="Faster">
                    <i data-lucide="fast-forward"></i>
                  </button>
                </div>
              </div>
            </div>
            <canvas id="aiWaveform" width="420" height="80"></canvas>
          </div>
        </div>
        
        <div id="messages" class="messages" aria-live="polite"></div>
      </div>
      </div>

      <div id="lowerBanner" class="lower-banner">
        <div id="lowerBannerContent" class="lower-banner-content">
          <div id="pageBannerStatus" class="page-banner-status" hidden>
            <span id="pageBannerTitle">Chat</span>
            <small id="pageBannerSubtitle">Use the menu to return to chat or switch tools.</small>
          </div>
          <div class="input-section">
            <form id="composer" class="composer" action="javascript:;">
              <div class="composer-voice" aria-label="Voice input activity">
                <canvas id="waveform" width="420" height="80"></canvas>
                <div id="vttOutput" class="vtt-output" aria-live="polite"></div>
              </div>
              <div class="input-wrapper">
                <input id="input" autocomplete="off" autocapitalize="sentences" enterkeyhint="send" placeholder="Ask Big Hal" />
                <button id="micToggle" class="btn-mic" type="button" aria-label="Toggle microphone" title="Toggle microphone">
                  <i data-lucide="mic"></i>
                </button>
                <button id="send" class="btn-send" aria-label="Send message">
                  <i data-lucide="send"></i>
                </button>
              </div>
            </form>
          </div>
        </div>
        <div id="lowerBannerActions" class="lower-banner-actions">
          <button id="clearChat" class="chat-clear-btn" type="button" aria-label="Clear chat" title="Clear chat">
            <i data-lucide="trash-2"></i>
          </button>
          <button id="fabMenu" class="fab-menu" type="button" aria-label="Open menu" aria-expanded="false" title="Open menu">
            <span class="menu-glyph" aria-hidden="true">☰</span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/vendor/lucide/lucide.min.js"></script>
  <script src="/app.js"></script>
  <script src="/mic.js"></script>
  <script src="/menu/memory.js"></script>
  <script src="/menu/web-search.js"></script>
  <script src="/menu/models.js"></script>
  <script src="/menu/monitor.js"></script>
  <script src="/menu/dashboards.js"></script>
  <script src="/menu/logging-remote.js"></script>
  <script src="/menu.js"></script>
</body>
</html>
