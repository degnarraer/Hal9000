<section class="panel-view admin-view">
  <div class="monitor-toolbar">
    <h3>Admin Menu</h3>
  </div>

  <div class="admin-grid">
    <button class="admin-card" type="button" data-admin-route="users">
      <i data-lucide="users"></i>
      <span>
        <strong>Users</strong>
        <small>Review seen users and manage admin access.</small>
      </span>
    </button>

    <button class="admin-card" type="button" data-admin-route="models">
      <i data-lucide="boxes"></i>
      <span>
        <strong>Models</strong>
        <small>Install, remove, and download Ollama models.</small>
      </span>
    </button>

    <button class="admin-card" type="button" data-admin-route="monitor">
      <i data-lucide="activity"></i>
      <span>
        <strong>Monitor</strong>
        <small>Check the current Ollama server state.</small>
      </span>
    </button>

    <button class="admin-card" type="button" data-admin-route="logging">
      <i data-lucide="logs"></i>
      <span>
        <strong>Logging</strong>
        <small>Watch recent server activity.</small>
      </span>
    </button>

    <button class="admin-card" type="button" data-admin-route="appTester">
      <i data-lucide="flask-conical"></i>
      <span>
        <strong>App Tester</strong>
        <small>Open admin-only test pages for Bob voice and rendering checks.</small>
      </span>
    </button>

    <button class="admin-card" type="button" data-admin-route="activity">
      <i data-lucide="chart-line"></i>
      <span>
        <strong>Activity</strong>
        <small>Track users, actions, and connection rates.</small>
      </span>
    </button>

    <button class="admin-card" type="button" data-admin-route="security">
      <i data-lucide="shield-alert"></i>
      <span>
        <strong>Security</strong>
        <small>Review auth failures and admin access denials.</small>
      </span>
    </button>

    <button class="admin-card" type="button" data-admin-route="remote">
      <i data-lucide="power"></i>
      <span>
        <strong>Remote Control</strong>
        <small>Restart the local server process.</small>
      </span>
    </button>
  </div>
</section>
