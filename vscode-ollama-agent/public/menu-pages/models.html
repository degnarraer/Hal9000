<section class="panel-view">
  <h3>Ollama Config</h3>
  <div class="ollama-config-grid">
    <label>
      <span>Keep loaded</span>
      <select id="ollamaKeepAlive">
        <option value="0">Unload after response</option>
        <option value="5m">5 minutes</option>
        <option value="30m">30 minutes</option>
        <option value="1h">1 hour</option>
        <option value="-1">Keep loaded</option>
      </select>
    </label>
    <label>
      <span>Active users keep loaded</span>
      <select id="ollamaActiveKeepAlive">
        <option value="-1">Keep loaded while active</option>
        <option value="30m">30 minutes</option>
        <option value="1h">1 hour</option>
        <option value="5m">5 minutes</option>
      </select>
    </label>
    <label>
      <span>Unload after no users</span>
      <select id="ollamaIdleUnloadDelayMs">
        <option value="10000">10 seconds</option>
        <option value="30000">30 seconds</option>
        <option value="60000">1 minute</option>
        <option value="300000">5 minutes</option>
      </select>
    </label>
    <div class="ollama-config-actions">
      <button id="saveOllamaConfig" type="button">Save</button>
    </div>
  </div>
  <div id="ollamaConfigStatus" class="model-status"></div>

  <hr />

  <h3>Installed Models</h3>
  <div id="modelsList" class="models-list">Loading...</div>

  <hr />

  <h3>Available Bob Models</h3>
  <div id="availableList" class="models-list">Loading...</div>

  <hr />

  <h4>Manual Install</h4>
  <div class="install-row">
    <input id="modelInput" placeholder="model/name:tag or url" />
    <button id="installBtn" type="button">Install</button>
  </div>
  <div id="modelStatus" class="model-status"></div>

  <h4>Downloads</h4>
  <div id="pullJobsList" class="pull-jobs-list">No downloads yet</div>
</section>
