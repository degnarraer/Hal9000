<section class="panel-view memory-manager">
  <div class="monitor-toolbar">
    <h3>Bob's Memory</h3>
    <button id="refreshMemory" type="button">
      <i data-lucide="refresh-cw"></i>
      Refresh
    </button>
    <button id="memoryRequirements" type="button">
      <i data-lucide="file-text"></i>
      Requirements
    </button>
    <button id="wipeMemory" class="memory-wipe-btn" type="button">
      <i data-lucide="database-zap"></i>
      Wipe Memory
    </button>
  </div>

  <div id="memoryStatus" class="model-status"></div>

  <section class="monitor-card memory-factoid-card">
    <h4>User Factoids</h4>
    <div id="memoryFactoids" class="memory-factoid-list">Loading...</div>
  </section>

  <section class="monitor-card memory-chat-card">
    <h4>Chat Memory</h4>
    <div id="memoryMessages" class="memory-message-list">Loading...</div>
  </section>
</section>
