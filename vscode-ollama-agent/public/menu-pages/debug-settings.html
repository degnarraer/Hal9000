<section class="panel-view">
  <div class="monitor-toolbar">
    <h3>Debug Settings</h3>
  </div>

  <div class="settings-group debug-settings-group">
    <label class="debug-setting-row">
      <input id="showChatDebugPills" type="checkbox">
      <span>
        <strong>Show main chat debug pills</strong>
        <small>Display admin-only skill, stage, and copy-debug pills on Bob chat bubbles.</small>
      </span>
    </label>

    <button id="saveDebugSettings" class="settings-action" type="button">
      <i data-lucide="save"></i>
      Save Debug Settings
    </button>
    <p id="debugSettingsStatus" class="panel-copy">Loading debug settings...</p>
  </div>
</section>
