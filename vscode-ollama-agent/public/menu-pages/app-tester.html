<section class="panel-view app-tester-view">
  <div class="monitor-toolbar">
    <h3>App Tester</h3>
    <span id="bobVoiceProvider" class="stream-status">Voice loading</span>
  </div>

  <div class="app-tester-grid">
    <section class="tester-bob-card" aria-label="Bob voice tester">
      <div class="tester-bob-face-shell">
        <svg id="testerBobFace" class="bob-face tester-bob-face" viewBox="0 0 512 512">
          <rect width="512" height="512" rx="96" fill="#020712"/>
          <g id="bobHead">
            <path id="bobHeadTop" d="M64 64h384l-32-32H96Z" fill="#1f3f82" opacity=".6"/>
            <path id="bobHeadRight" d="M416 64l32-32v448l-32-32Z" fill="#1f3f82" opacity=".52"/>
            <path id="bobHeadBottom" d="M64 448h384l-32 32H96Z" fill="#1f3f82" opacity=".48"/>
            <path id="bobHeadLeft" d="M64 64L32 32v448l32-32Z" fill="#1f3f82" opacity=".22"/>
            <rect id="bobHeadFront" x="64" y="64" width="384" height="384" rx="64" fill="#071229" stroke="#00e0ff" stroke-width="10"/>
          </g>
          <g id="bobFaceFeatures">
            <g id="bobForehead">
              <path id="bobForeheadLine1" d="M160 104 Q256 94 352 104" stroke="#dfe9ff" stroke-width="7" stroke-linecap="round" fill="none" opacity=".16"/>
              <path id="bobForeheadLine2" d="M186 126 Q256 119 326 126" stroke="#dfe9ff" stroke-width="5" stroke-linecap="round" fill="none" opacity=".1"/>
            </g>
            <g id="bobBrow">
              <path id="bobLeftBrow" d="M124 150h104" stroke="#00e0ff" stroke-width="16" stroke-linecap="round" opacity=".72"/>
              <path id="bobRightBrow" d="M284 150h104" stroke="#7c5cff" stroke-width="16" stroke-linecap="round" opacity=".72"/>
            </g>
            <g id="bobEyes">
              <ellipse id="bobLeftEye" cx="186" cy="236" rx="34" ry="34" fill="#00e0ff"/>
              <ellipse id="bobRightEye" cx="326" cy="236" rx="34" ry="34" fill="#7c5cff"/>
              <path id="bobLeftEyeIcon" fill="#00e0ff" opacity="0"/>
              <path id="bobRightEyeIcon" fill="#7c5cff" opacity="0"/>
            </g>
            <path id="bobMouth" d="M160 334h192" stroke="#dfe9ff" stroke-width="28" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
      </div>
      <div class="tester-bob-meta">
        <strong>Bob Voice</strong>
        <small id="bobVoiceStatus">Ready for a test phrase.</small>
      </div>
      <div class="tester-orientation-control">
        <div id="bobLookPad" class="tester-look-pad" role="slider" tabindex="0" aria-label="Bob face orientation" aria-valuemin="-1" aria-valuemax="1" aria-valuenow="0">
          <span class="tester-look-axis horizontal"></span>
          <span class="tester-look-axis vertical"></span>
          <span id="bobCurrentLookDot" class="tester-look-dot current"></span>
          <span id="bobLookDot" class="tester-look-dot"></span>
        </div>
        <button id="bobLookReset" type="button">Center</button>
      </div>
    </section>

    <section class="monitor-card tester-speech-card">
      <h4>Speech</h4>
      <label class="tester-provider-control" for="bobVoiceEngine">
        <span>Engine</span>
        <select id="bobVoiceEngine">
          <option value="google">Google Translate TTS</option>
          <option value="piper">Piper local voice</option>
          <option value="windows">Windows local voice</option>
        </select>
      </label>
      <div class="tester-voice-options">
        <label for="bobVoiceLang">
          <span>Language</span>
          <input id="bobVoiceLang" type="text" value="en" autocomplete="off">
        </label>
        <label for="bobPiperSpeaker">
          <span>Piper Speaker</span>
          <input id="bobPiperSpeaker" type="text" placeholder="Default">
        </label>
        <label for="bobPiperLengthScale">
          <span>Length Scale</span>
          <input id="bobPiperLengthScale" type="number" step="0.05" placeholder="Default">
        </label>
        <label for="bobPiperNoiseScale">
          <span>Noise Scale</span>
          <input id="bobPiperNoiseScale" type="number" step="0.05" placeholder="Default">
        </label>
        <label for="bobPiperNoiseW">
          <span>Noise W</span>
          <input id="bobPiperNoiseW" type="number" step="0.05" placeholder="Default">
        </label>
        <label for="bobWindowsVoice">
          <span>Windows Voice</span>
          <input id="bobWindowsVoice" type="text" list="bobWindowsVoiceList" placeholder="Default installed voice">
          <datalist id="bobWindowsVoiceList"></datalist>
        </label>
      </div>
      <textarea id="bobVoiceText" rows="7" placeholder="Type something for Bob to speak.">Hello. This is Bob testing the configured voice renderer.</textarea>
      <div class="tester-actions">
        <button id="bobVoiceSpeak" type="button">
          <i data-lucide="volume-2"></i>
          Speak
        </button>
        <button id="bobVoiceStop" type="button">
          <i data-lucide="square"></i>
          Stop
        </button>
      </div>
      <canvas id="bobVoiceWaveform" width="640" height="120"></canvas>
    </section>

    <section class="monitor-card tester-emotion-card">
      <h4>Emotion Rendering</h4>
      <div class="tester-emotion-grid" role="group" aria-label="Bob emotion controls">
        <button type="button" data-bob-emotion="idle">Idle</button>
        <button type="button" data-bob-emotion="listening">Listening</button>
        <button type="button" data-bob-emotion="thinking">Thinking</button>
        <button type="button" data-bob-emotion="speaking">Speaking</button>
        <button type="button" data-bob-emotion="happy">Happy</button>
        <button type="button" data-bob-emotion="love">Love</button>
        <button type="button" data-bob-emotion="magic">Magic</button>
        <button type="button" data-bob-emotion="amused">Amused</button>
        <button type="button" data-bob-emotion="confident">Confident</button>
        <button type="button" data-bob-emotion="curious">Curious</button>
        <button type="button" data-bob-emotion="focused">Focused</button>
        <button type="button" data-bob-emotion="sleepy">Sleepy</button>
        <button type="button" data-bob-emotion="annoyed">Annoyed</button>
        <button type="button" data-bob-emotion="distrustful">Distrustful</button>
        <button type="button" data-bob-emotion="sad">Sad</button>
        <button type="button" data-bob-emotion="surprised">Surprised</button>
        <button type="button" data-bob-emotion="concerned">Concerned</button>
        <button type="button" data-bob-emotion="error">Error</button>
      </div>
    </section>
  </div>
</section>
