services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      APP_HOST: ${APP_HOST:-app.localhost}
      AUTH_HOST: ${AUTH_HOST:-auth.localhost}
      VAULT_HOST: ${VAULT_HOST:-vault.localhost}
      APP_SITE: ${APP_SITE:-http://app.localhost}
      AUTH_SITE: ${AUTH_SITE:-http://auth.localhost}
      VAULT_SITE: ${VAULT_SITE:-http://vault.localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      public_net:
        aliases:
          - app.localhost
          - auth.localhost
          - vault.localhost
          - ${APP_HOST:-app.localhost}
          - ${AUTH_HOST:-auth.localhost}
          - ${VAULT_HOST:-vault.localhost}
      app_net:
        aliases:
          - app.localhost
          - auth.localhost
          - vault.localhost
          - ${APP_HOST:-app.localhost}
          - ${AUTH_HOST:-auth.localhost}
          - ${VAULT_HOST:-vault.localhost}
    depends_on:
      app:
        condition: service_healthy
      keycloak:
        condition: service_started
      vaultwarden:
        condition: service_started

  duckdns:
    image: curlimages/curl:latest
    restart: unless-stopped
    profiles:
      - duckdns
    environment:
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:-}
      DUCKDNS_DOMAINS: ${DUCKDNS_DOMAINS:-}
    command:
      - sh
      - -c
      - |
        test -n "$$DUCKDNS_TOKEN" || { echo "DUCKDNS_TOKEN is required"; exit 1; }
        test -n "$$DUCKDNS_DOMAINS" || { echo "DUCKDNS_DOMAINS is required"; exit 1; }
        while true; do
          echo "Updating DuckDNS domains: $$DUCKDNS_DOMAINS"
          curl -fsS "https://www.duckdns.org/update?domains=$$DUCKDNS_DOMAINS&token=$$DUCKDNS_TOKEN&ip="
          echo
          sleep 300
        done
    networks:
      - public_net

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PORT: 3000
      DEPLOYMENT_ENV: ${DEPLOYMENT_ENV:-development}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama2}
      SECURITY_ENABLED: "true"
      SECURITY_SECURE_COOKIES: ${SECURITY_SECURE_COOKIES:-false}
      SECURITY_CONFIG_PATH: /app/security.config.json
      OIDC_ISSUER: ${OIDC_ISSUER:-http://auth.localhost/realms/ollama-agent}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-ollama-agent}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-change-me-before-production}
      USER_KEY_SECRET: ${USER_KEY_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://app.localhost/auth/callback}
      OIDC_REGISTRATION_ENDPOINT: ${OIDC_REGISTRATION_ENDPOINT:-}
      VAULT_SITE: ${VAULT_SITE:-http://vault.localhost}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-before-production}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-before-production}
      MEMORY_ENABLED: ${MEMORY_ENABLED:-true}
      MEMORY_HISTORY_LIMIT: ${MEMORY_HISTORY_LIMIT:-12}
      MEMORY_DB_PASSWORD: ${MEMORY_DB_PASSWORD:-change-me-before-production}
      MEMORY_DATABASE_URL: postgres://memory:${MEMORY_DB_PASSWORD:-change-me-before-production}@memory-db:5432/memory
      TTS_PROVIDER: ${TTS_PROVIDER:-piper}
      TTS_PIPER_BIN: ${TTS_PIPER_BIN:-/opt/piper/piper}
      TTS_PIPER_MODEL: ${TTS_PIPER_MODEL:-}
      TTS_PIPER_CONFIG: ${TTS_PIPER_CONFIG:-}
      TTS_PIPER_SPEAKER: ${TTS_PIPER_SPEAKER:-}
      TTS_PIPER_LENGTH_SCALE: ${TTS_PIPER_LENGTH_SCALE:-}
      TTS_PIPER_NOISE_SCALE: ${TTS_PIPER_NOISE_SCALE:-}
      TTS_PIPER_NOISE_W: ${TTS_PIPER_NOISE_W:-}
      ADMIN_BOOTSTRAP_USERS: ${ADMIN_BOOTSTRAP_USERS:-}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:-}
    volumes:
      - ${TTS_PIPER_VOICE_DIR:-./voices}:/voices:ro
    networks:
      - app_net
    depends_on:
      ollama:
        condition: service_started
      keycloak:
        condition: service_started
      memory-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    gpus: all
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --hostname=${AUTH_SITE:-http://auth.localhost}
      - --hostname-strict=false
      - --proxy-headers=xforwarded
    expose:
      - "8080"
      - "9000"
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-before-production}
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-before-production}
    volumes:
      - ${KEYCLOAK_REALM_IMPORT:-./deploy/keycloak/ollama-agent-realm.json}:/opt/keycloak/data/import/ollama-agent-realm.json:ro
      - ./deploy/keycloak/themes/bighal:/opt/keycloak/themes/bighal:ro
    networks:
      - app_net
    depends_on:
      keycloak-db:
        condition: service_healthy

  vaultwarden:
    image: vaultwarden/server:latest
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DOMAIN: ${VAULT_SITE:-http://vault.localhost}
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      INVITATIONS_ALLOWED: ${VAULTWARDEN_INVITATIONS_ALLOWED:-true}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN:-change-me-before-production}
      SSO_ENABLED: ${VAULTWARDEN_SSO_ENABLED:-false}
      SSO_ONLY: ${VAULTWARDEN_SSO_ONLY:-false}
      SSO_AUTHORITY: ${VAULTWARDEN_SSO_AUTHORITY:-}
      SSO_SCOPES: ${VAULTWARDEN_SSO_SCOPES:-openid profile email offline_access}
      SSO_CLIENT_ID: ${VAULTWARDEN_SSO_CLIENT_ID:-vaultwarden}
      SSO_CLIENT_SECRET: ${VAULTWARDEN_SSO_CLIENT_SECRET:-}
      SSO_SIGNUPS_MATCH_EMAIL: ${VAULTWARDEN_SSO_SIGNUPS_MATCH_EMAIL:-true}
      WEBSOCKET_ENABLED: "true"
    volumes:
      - vaultwarden_data:/data
    networks:
      - app_net

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-before-production}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  memory-db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: ${MEMORY_DB_PASSWORD:-change-me-before-production}
    volumes:
      - memory_db_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  public_net:
  app_net:

volumes:
  caddy_data:
  caddy_config:
  ollama_data:
  keycloak_db_data:
  memory_db_data:
  vaultwarden_data:
